{% extends 'base.html' %}

{% block title %}Server Error - Surtaal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2 text-center">
        <div class="card">
            <div class="card-body py-5">
                <div style="font-size: 6rem; margin-bottom: 1rem; color: var(--bs-danger);">
                    <i class="fas fa-exclamation-triangle fa-beat"></i>
                </div>
                <h1 class="display-1 mb-3">500</h1>
                <h2 class="mb-4">Server Error</h2>
                <p class="lead mb-4">Something went wrong on our end. Please try again later.</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
